name: Deploy to Hostinger via SFTP

on:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload files to .com via SFTP mohamedabdelrahman.com
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME  }}
          password: ${{ secrets.FTP_PASSWORD  }}
          port: ${{ secrets.FTP_PORT }}
          source: ".,!.git,!.github"
          target: "/home/u627514535/domains/mohamedabdelrahman.com/public_html"
          rm: false

      - name: Upload files to .net via SFTP mohamedabdelrahman.net 
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME  }}
          password: ${{ secrets.FTP_PASSWORD  }}
          port: ${{ secrets.FTP_PORT }}
          source: ".,!.git,!.github"
          target: "/home/u627514535/domains/mohamedabdelrahman.net/public_html"
          rm: false